      <h2>Grade Calculator</h2>
      <form id="gradeForm">
          <div class="form-group">
              <label for="subject1">Math:</label>
              <input type="number" id="subject1" min="0" max="100" required>
          </div>
  
          <div class="form-group">
              <label for="subject2">Science:</label>
              <input type="number" id="subject2" min="0" max="100" required>
          </div>
  
          <div class="form-group">
              <label for="subject3">English:</label>
              <input type="number" id="subject3" min="0" max="100" required>
          </div>
  
          <div class="form-group">
              <label for="subject4">History:</label>
              <input type="number" id="subject4" min="0" max="100" required>
          </div>
  
          <div class="form-group">
              <label for="subject5">Computer Science:</label>
              <input type="number" id="subject5" min="0" max="100" required>
          </div>
  
          <button type="button" onclick="calculateGrades()">Calculate Grades</button>
      </form>
  
      <div id="result"></div>
  
      <script>
          function getGrade(marks) {
              switch (true) {
                  case (marks >= 90 && marks <= 100):
                      return "A+";
                  case (marks >= 80 && marks < 90):
                      return "A";
                  case (marks >= 70 && marks < 80):
                      return "B";
                  case (marks >= 60 && marks < 70):
                      return "C";
                  case (marks >= 50 && marks < 60):
                      return "D";
                  default:
                      return "F";
              }
          }
  
          function calculateGrades() {
              let subjects = [
                  parseFloat(document.getElementById("subject1").value),
                  parseFloat(document.getElementById("subject2").value),
                  parseFloat(document.getElementById("subject3").value),
                  parseFloat(document.getElementById("subject4").value),
                  parseFloat(document.getElementById("subject5").value)
              ];
  
              let totalMarks = 0;
              let output = "<h3>Individual Subject Grades<br></h3>";
              
  
              for (let i = 0; i < subjects.length; i++) {
                  if (isNaN(subjects[i]) || subjects[i] < 0 || subjects[i] > 100) {
                      alert("Please enter valid marks (0-100) for all subjects.");
                      return;
                  }
                  let grade = getGrade(subjects[i]);
                  output += `Subject ${i + 1}: ${subjects[i]}% - Grade: ${grade}<br>`;
                  totalMarks += subjects[i];
              }
  
              let percentage = totalMarks / subjects.length;
              let finalGrade = getGrade(percentage);
  
              output += `<h3>Final Results</h3>`;
              output += `Total Marks: ${totalMarks} / 500 <br>`;
              output += `Final Percentage: ${percentage.toFixed(2)}% <br>`;
              output += `<strong>Overall Grade: ${finalGrade}</strong>`;
  
              document.getElementById("result").innerHTML = output;
          }
      </script>
