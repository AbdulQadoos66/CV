  <script>
    function calculatePrice(event) {
      event.preventDefault(); // Prevent form submission

      // Get input values
      let userName = document.getElementById("userName").value;
      let units = parseFloat(document.getElementById("units").value);
      let pricePerUnit = parseFloat(document.getElementById("pricePerUnit").value);

      // Validate input
      if (isNaN(units) || isNaN(pricePerUnit)) {
        alert("Please enter valid numbers for units and price per unit.");
        return;
      }

      // Calculate total price
      let totalPrice = units * pricePerUnit;
      let totalPriceWithVAT = totalPrice * 1.2; // Assuming 20% VAT

      // Display result
      document.getElementById("result").innerHTML = 
        `<p><strong>Dear ${userName},</strong></p>
         <p></t>Your order total before tax: <b>£${totalPrice.toFixed(2)}</b></p>
         <p>Your order total after tax (20% VAT): <b>£${totalPriceWithVAT.toFixed(2)}</b></p>`;
    }

    function countRefresh() {
      let count = sessionStorage.getItem("refreshCount") || 0;
      count = parseInt(count) + 1;
      sessionStorage.setItem("refreshCount", count);

      let response = prompt(`This page has been refreshed ${count} times.\nDo you want to refresh again? (Y/N)`, "N");
      if (response.toUpperCase() === "Y") {
        location.reload();
      }
    }
  </script>
